  # Load testing
  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: carnelian
          POSTGRES_PASSWORD: carnelian
          POSTGRES_DB: carnelian
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libglib2.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: carnelian-rust

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CARNELIAN
        run: cargo build --release
        env:
          SQLX_OFFLINE: true

      - name: Run database migrations
        run: cargo run --release -p carnelian-bin --bin carnelian -- migrate --database-url postgresql://carnelian:carnelian@localhost:5432/carnelian
        env:
          SQLX_OFFLINE: true

      - name: Start CARNELIAN server
        env:
          DATABASE_URL: postgresql://carnelian:carnelian@localhost:5432/carnelian
          CARNELIAN_HTTP_PORT: 8080
          CARNELIAN_BIND_ADDRESS: 127.0.0.1
          SQLX_OFFLINE: true
        run: |
          cargo run --release -p carnelian-bin --bin carnelian start > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Wait for server to be ready (max 60 seconds)
          for i in {1..60}; do
            if curl -s http://127.0.0.1:8080/v1/health > /dev/null 2>&1; then
              echo "Server is ready after $i seconds"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Server failed to start within 60 seconds"
              cat server.log
              exit 1
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        working-directory: tests/performance
        timeout-minutes: 10
        run: k6 run load_test.js
      
      - name: Show server logs on failure
        if: failure()
        run: cat server.log || echo "No server log found"

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: tests/performance/results/
          retention-days: 30
