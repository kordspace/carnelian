name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rust formatting and linting
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: carnelian-rust

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          SQLX_OFFLINE: true

  # Rust build and test
  rust-build-test:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: carnelian-rust

      - name: Build workspace
        run: cargo build --workspace --all-targets
        env:
          SQLX_OFFLINE: true

      - name: Run tests
        run: cargo test --workspace
        env:
          SQLX_OFFLINE: true

      - name: Build documentation
        run: cargo doc --workspace --no-deps
        env:
          SQLX_OFFLINE: true

  # Node.js worker validation
  node-worker:
    name: Node.js Worker
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        working-directory: workers/node-worker
        run: npm install

      - name: Run lint (if present)
        working-directory: workers/node-worker
        run: npm run lint --if-present

      - name: Run tests (if present)
        working-directory: workers/node-worker
        run: npm test --if-present

      - name: Validate worker starts
        working-directory: workers/node-worker
        run: node index.js

  # Integration tests (requires PostgreSQL)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: rust-build-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: carnelian_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: carnelian-rust

      - name: Pre-build workspace (so CLI tests don't compile inside cargo test)
        run: cargo build --workspace --tests
        env:
          SQLX_OFFLINE: true

      - name: Run integration tests
        run: cargo test --workspace -- --ignored
        env:
          SQLX_OFFLINE: true
          DATABASE_URL: postgresql://test:test@localhost:5432/carnelian_test

  # Secret scanning
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan for secrets
        run: |
          # Scan using existing baseline settings and compare
          detect-secrets scan --baseline .secrets.baseline > /tmp/new_baseline.json
          # Audit will return non-zero if there are unaudited secrets
          detect-secrets audit .secrets.baseline --report
