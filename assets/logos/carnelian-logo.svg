<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B7410E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2E0A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Carnelian Gemstone Icon -->
  <g transform="translate(15, 15)" filter="url(#glow)">
    <!-- Gemstone shape - multi-faceted carnelian stone -->
    <polygon points="35,5 55,15 60,35 50,55 30,60 10,50 5,30 15,10" fill="url(#gemGradient)" stroke="#B7410E" stroke-width="1.5"/>
    <!-- Facet lines -->
    <line x1="35" y1="5" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="55" y1="15" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="60" y1="35" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="50" y1="55" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="30" y1="60" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="10" y1="50" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="5" y1="30" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <line x1="15" y1="10" x2="35" y2="30" stroke="#FF6F00" stroke-width="0.5" opacity="0.6"/>
    <!-- Center highlight -->
    <circle cx="35" cy="30" r="8" fill="#FF6F00" opacity="0.3"/>
  </g>
  
  <!-- Text: Carnelian OS -->
  <text x="90" y="45" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#B7410E" letter-spacing="-0.5">
    Carnelian
  </text>
  <text x="90" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#8B2E0A" letter-spacing="1">
    OS
  </text>
</svg>
