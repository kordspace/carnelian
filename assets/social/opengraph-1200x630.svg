<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- OpenGraph Card — 1200x630 -->

  <!-- Background: Obsidian -->
  <rect width="1200" height="630" fill="#0B0E14"/>

  <!-- Radial glow: Carnelian Ember at centre-left -->
  <defs>
    <radialGradient id="og-glow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D24B2A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0B0E14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- Gemstone icon (~200x200, centred at x=200, y=315) -->
  <g transform="translate(100,215) scale(3.125)">
    <polygon points="18,18 46,18 38,8 26,8" fill="#D24B2A"/>
    <polygon points="18,18 26,8 10,24" fill="#E0613E"/>
    <polygon points="46,18 38,8 54,24" fill="#E0613E"/>
    <polygon points="26,8 38,8 34,12 30,12" fill="#F2C14E"/>
    <polygon points="10,24 18,18 18,40" fill="#A33520"/>
    <polygon points="54,24 46,18 46,40" fill="#A33520"/>
    <polygon points="18,18 32,28 18,40" fill="#D24B2A"/>
    <polygon points="46,18 32,28 46,40" fill="#D24B2A"/>
    <polygon points="18,40 32,28 32,58" fill="#A33520"/>
    <polygon points="46,40 32,28 32,58" fill="#E0613E"/>
    <polygon points="10,24 18,40 32,58" fill="#8B2A18"/>
    <polygon points="54,24 46,40 32,58" fill="#C4442A"/>
  </g>

  <!-- Title: "Carnelian OS" -->
  <text x="420" y="260" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="60" fill="#F2EFEA">🔥 Carnelian OS</text>

  <!-- Tagline -->
  <text x="420" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#F2C14E">Built in the forge. Shipped with confidence.</text>

  <!-- URL -->
  <text x="420" y="380" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#39D98A">github.com/kordspace/carnelian</text>

  <!-- Bottom strip: 4px Carnelian Ember bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#D24B2A"/>
</svg>
