<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- GitHub Preview — 1280x640 -->

  <!-- Background: Obsidian -->
  <rect width="1280" height="640" fill="#0B0E14"/>

  <!-- Radial glow: Carnelian Ember at centre-left -->
  <defs>
    <radialGradient id="gh-glow" cx="30%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#D24B2A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0B0E14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#gh-glow)"/>

  <!-- Gemstone icon (~200x200, centred at x=200, y=260) -->
  <g transform="translate(100,165) scale(3.125)">
    <polygon points="18,18 46,18 38,8 26,8" fill="#D24B2A"/>
    <polygon points="18,18 26,8 10,24" fill="#E0613E"/>
    <polygon points="46,18 38,8 54,24" fill="#E0613E"/>
    <polygon points="26,8 38,8 34,12 30,12" fill="#F2C14E"/>
    <polygon points="10,24 18,18 18,40" fill="#A33520"/>
    <polygon points="54,24 46,18 46,40" fill="#A33520"/>
    <polygon points="18,18 32,28 18,40" fill="#D24B2A"/>
    <polygon points="46,18 32,28 46,40" fill="#D24B2A"/>
    <polygon points="18,40 32,28 32,58" fill="#A33520"/>
    <polygon points="46,40 32,28 32,58" fill="#E0613E"/>
    <polygon points="10,24 18,40 32,58" fill="#8B2A18"/>
    <polygon points="54,24 46,40 32,58" fill="#C4442A"/>
  </g>

  <!-- Title: "Carnelian OS" -->
  <text x="420" y="230" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="60" fill="#F2EFEA">🔥 Carnelian OS</text>

  <!-- Tagline -->
  <text x="420" y="290" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#F2C14E">Built in the forge. Shipped with confidence.</text>

  <!-- URL -->
  <text x="420" y="340" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#39D98A">github.com/kordspace/carnelian</text>

  <!-- Feature badges row -->
  <!-- Badge: Rust Core -->
  <rect x="120" y="480" width="180" height="40" rx="20" fill="#141824"/>
  <text x="210" y="506" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#39D98A" text-anchor="middle">💎 Rust Core</text>

  <!-- Badge: Capability Security -->
  <rect x="330" y="480" width="240" height="40" rx="20" fill="#141824"/>
  <text x="450" y="506" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#39D98A" text-anchor="middle">🔒 Capability Security</text>

  <!-- Badge: XP System -->
  <rect x="600" y="480" width="180" height="40" rx="20" fill="#141824"/>
  <text x="690" y="506" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#39D98A" text-anchor="middle">📊 XP System</text>

  <!-- Badge: Voice Gateway -->
  <rect x="810" y="480" width="210" height="40" rx="20" fill="#141824"/>
  <text x="915" y="506" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#39D98A" text-anchor="middle">🎙️ Voice Gateway</text>

  <!-- Bottom strip: 4px Carnelian Ember bar -->
  <rect x="0" y="636" width="1280" height="4" fill="#D24B2A"/>
</svg>
