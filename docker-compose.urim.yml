# =============================================================================
# Carnelian OS - Urim Machine Profile Override
# =============================================================================
# Urim: RTX 2080 Ti (11GB VRAM), 64GB RAM
# Recommended model: deepseek-r1:32b
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.urim.yml up -d
# =============================================================================

services:
  carnelian-core:
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 8G
        reservations:
          memory: 2G
