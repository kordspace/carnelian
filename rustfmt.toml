# Carnelian OS Rust formatting configuration
# These are project-wide formatting standards that align with the workspace edition.

edition = "2021"
style_edition = "2021"
max_width = 100
use_small_heuristics = "Default"

# Note: Advanced import organization and doc comment formatting features
# (imports_granularity, group_imports, format_code_in_doc_comments) are only
# available in nightly rustfmt and have been removed to avoid warnings on stable.
