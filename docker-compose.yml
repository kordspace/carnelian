# =============================================================================
# Carnelian OS - Production Environment
# =============================================================================
# This Docker Compose configuration provides full production infrastructure:
# - PostgreSQL 16 with pgvector extension for vector embeddings
# - Ollama runtime with NVIDIA GPU support for local LLM inference
# - Carnelian Core orchestrator with health checks and resource limits
#
# Machine Profiles:
# - Standard: Entry-level GPU (8GB VRAM), 32GB RAM
# - Performance: High-end GPU (11GB+ VRAM), 64GB RAM
#
# Quick Start:
#   docker-compose up -d
#   docker-compose ps
#   docker-compose logs -f
#
# Production with Machine Profile:
#   docker-compose -f docker-compose.yml -f docker-compose.performance.yml up -d
#   docker-compose -f docker-compose.yml -f docker-compose.standard.yml up -d
#
# Shutdown:
#   docker-compose down          # Preserve data
#   docker-compose down -v       # Remove volumes (data loss!)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with pgvector Extension
  # ---------------------------------------------------------------------------
  # Connection String: postgresql://carnelian:carnelian@localhost:5432/carnelian
  # Docker Internal:   postgresql://carnelian:carnelian@carnelian-postgres:5432/carnelian
  #
  # The pgvector extension enables vector similarity search for embeddings.
  # Run migrations with: sqlx migrate run --database-url <connection_string>
  # See db/migrations/README.md for migration instructions.
  # ---------------------------------------------------------------------------
  carnelian-postgres:
    image: pgvector/pgvector:pg16
    container_name: carnelian-postgres
    environment:
      POSTGRES_USER: carnelian
      POSTGRES_PASSWORD: carnelian
      POSTGRES_DB: carnelian
      PGVECTOR_DIMS: 1536
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carnelian"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama Runtime with NVIDIA GPU Support
  # ---------------------------------------------------------------------------
  # API Endpoint: http://localhost:11434
  # Docker Internal: http://carnelian-ollama:11434
  #
  # GPU Requirements:
  # - NVIDIA GPU with CUDA support
  # - NVIDIA Container Toolkit installed
  # - Docker configured for GPU access
  #
  # Machine Download:
  #   docker exec carnelian-ollama ollama pull deepseek-r1:7b    # Standard profile
  #   docker exec carnelian-ollama ollama pull deepseek-r1:32b   # Performance profile (if VRAM allows)
  #
  # Memory Requirements:
  # - deepseek-r1:7b (Q4_K_M): ~6GB VRAM, ~8GB RAM
  # - deepseek-r1:32b: ~20GB VRAM (requires Performance profile or better)
  # ---------------------------------------------------------------------------
  carnelian-ollama:
    image: ollama/ollama:latest
    container_name: carnelian-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_KEEP_ALIVE: "-1"      # Keep models loaded indefinitely
      OLLAMA_NUM_GPU: "999"        # Use all available GPU layers
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 12G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Carnelian LLM Gateway
  # ---------------------------------------------------------------------------
  # HTTP API: http://localhost:18790
  # Docker Internal: http://carnelian-gateway:18790
  #
  # Provides unified LLM completion API with local-first routing and remote fallback.
  # Also serves as the message gateway for multi-channel communication skills
  # (whatsapp-send, message-send).
  #
  # Service dependencies: Ollama for local LLM routing
  # Health check: GET /health endpoint
  # ---------------------------------------------------------------------------
  carnelian-gateway:
    image: carnelian/gateway:latest
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: carnelian-gateway
    environment:
      GATEWAY_PORT: 18790
      CORE_API_URL: http://carnelian-core:18789
      OLLAMA_BASE_URL: http://carnelian-ollama:11434
      OLLAMA_ENABLED: "true"
      LOCAL_FIRST: "true"
      FALLBACK_ENABLED: "true"
      MAX_TOKENS: 8192
      REQUEST_TIMEOUT_MS: 60000
    ports:
      - "18790:18790"
    depends_on:
      carnelian-ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Carnelian Core Orchestrator
  # ---------------------------------------------------------------------------
  # HTTP API: http://localhost:18789
  # Docker Internal: http://carnelian-core:18789
  #
  # Service dependencies: PostgreSQL, Ollama, and Gateway must be healthy before starting
  # Health check: GET /v1/health endpoint
  #
  # Machine profile resource limits can be overridden via compose override files:
  #   docker-compose -f docker-compose.yml -f docker-compose.performance.yml up -d
  # ---------------------------------------------------------------------------
  carnelian-core:
    image: carnelian/carnelian-core:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carnelian-core
    command: carnelian start
    environment:
      DATABASE_URL: postgresql://carnelian:carnelian@carnelian-postgres:5432/carnelian
      CARNELIAN_OLLAMA_URL: http://carnelian-ollama:11434
      CARNELIAN_GATEWAY_URL: http://carnelian-gateway:18790
      CARNELIAN_ENV: production
      LOG_LEVEL: INFO
    volumes:
      - ./machine.toml:/app/machine.toml:ro
      - carnelian-data:/app/data
      - ~/.carnelian:/root/.carnelian:ro
    ports:
      - "18789:18789"
    depends_on:
      carnelian-postgres:
        condition: service_healthy
      carnelian-ollama:
        condition: service_healthy
      # Gateway is optional - comment out to run without it
      # carnelian-gateway:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 1G
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
# Data Persistence Strategy:
# - postgres-data: PostgreSQL database files (schemas, tables, indexes)
# - ollama-models: Downloaded Ollama models (can be large, 4-20GB per model)
# - carnelian-data: Carnelian core data directory
#
# Backup Recommendations:
# - PostgreSQL: Use pg_dump for logical backups
# - Ollama models: Can be re-downloaded, but caching saves bandwidth
#
# To inspect volumes:
#   docker volume inspect carnelian_postgres-data
#   docker volume inspect carnelian_ollama-models
# =============================================================================
volumes:
  postgres-data:
    driver: local
  ollama-models:
    driver: local
  carnelian-data:
    driver: local
